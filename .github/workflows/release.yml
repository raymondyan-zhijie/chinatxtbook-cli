# .github/workflows/release.yml
name: Build and Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: black --check src/ tests/
      - run: python -m compileall -q src/
      - run: python -c "from chinatxtbook.ui.app import run_app; print('TUI import OK')"
      - run: pytest tests/ -v --timeout=120

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - run: pip-audit

  build-exe:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller textual
      - run: python scripts/build_exe.py
      - run: sha256sum dist/ChinaTextbook.exe > dist/SHA256SUMS
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/ChinaTextbook.exe
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wheel:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install build
      - run: python -m build
      - run: sha256sum dist/* > dist/SHA256SUMS
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
