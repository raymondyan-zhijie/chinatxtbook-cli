# .github/workflows/release.yml
name: Build and Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: black --check src/ tests/
      - run: python -m compileall -q src/
      - run: python -m mypy src/chinatxtbook
      - run: python -c "from chinatxtbook.ui.app import run_app; print('TUI import OK')"
      - run: pytest tests/ -v --timeout=120

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - run: pip-audit

  build-exe:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller textual
      - run: python scripts/build_exe.py
      - run: sha256sum dist/ChinaTextbook.exe > dist/SHA256SUMS.exe
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/ChinaTextbook.exe
            dist/SHA256SUMS.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wheel:
    needs: [test, build-exe]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install build twine cyclonedx-bom
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python -c "import zipfile, glob; whl=glob.glob('dist/*.whl')[0]; assert any('styles.tcss' in n for n in zipfile.ZipFile(whl).namelist()), 'styles.tcss missing from wheel'; print('wheel contains styles.tcss')"
      - run: pip install dist/*.whl && cyclonedx-py environment -o dist/sbom.json
        continue-on-error: true
      - run: sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/sbom.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
